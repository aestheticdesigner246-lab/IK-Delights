<div class="events-isolated-page">

    <!-- PAGE TITLE -->
    <h2 class="page-title">
        <i class="fa-solid fa-calendar-days"></i>
        Events Management
    </h2>

    <!-- TABLE WRAPPER -->
    <div class="table-wrapper">
        <!-- TOP ACTIONS -->
        <div class="table-top-actions">
            <button class="btn-add" onclick="window.showAddEventModal()">
                <i class="fa-solid fa-plus"></i>
                Add New Event
            </button>
        </div>

        <!-- TABLE -->
        <div class="table-scroll">
            <table class="events-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Order ID</th>
                        <th>Payment ID</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Event Type</th>
                        <th>Guests</th>
                        <th>Package</th>
                        <th>Total</th>
                        <th>Advance</th>
                        <th>Remaining</th>
                        <th>Payment Status</th>
                        <th>Order Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                    <!-- DYNAMIC EVENTS WILL BE LOADED HERE -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- EVENT MODAL -->
    <div id="eventModal" class="event-modal">
        <div class="event-modal-content">
            <!-- MODAL HEADER -->
            <div class="event-modal-header">
                <h3 id="eventModalTitle">Add Event Booking</h3>
                <button class="close-modal-btn" onclick="window.closeEventModal()">&times;</button>
            </div>

            <!-- FORM GRID -->
            <div class="event-form-grid">
                <!-- CUSTOMER NAME -->
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="eventName" placeholder="Customer Name">
                </div>

                <!-- PHONE -->
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="eventPhone" placeholder="03XXXXXXXXX">
                </div>

                <!-- EVENT TYPE -->
                <div class="form-group">
                    <label>Event Type</label>
                    <input type="text" id="eventCategory" placeholder="Birthday / Wedding">
                </div>

                <!-- GUESTS -->
                <div class="form-group">
                    <label>Guests</label>
                    <input type="number" id="eventGuests" placeholder="Guests">
                </div>

                <!-- BUDGET -->
                <div class="form-group">
                    <label>Customer Budget</label>
                    <input type="number" id="eventBudget" placeholder="Budget">
                </div>

                <!-- TOTAL AMOUNT -->
                <div class="form-group">
                    <label>Total Amount</label>
                    <input type="number" id="eventTotal" placeholder="Total">
                </div>

                <!-- ADVANCE PAYMENT -->
                <div class="form-group">
                    <label>Advance Payment</label>
                    <input type="number" id="eventAdvance" placeholder="Advance Received">
                </div>

                <!-- REMAINING AMOUNT (readonly) -->
                <div class="form-group">
                    <label>Remaining Amount</label>
                    <input type="number" id="eventRemaining" placeholder="Remaining Amount" readonly>
                </div>

                <!-- SELECTED PACKAGE (DROPDOWN) -->
                <div class="form-group">
                    <label>Selected Package</label>
                    <select id="eventPackage">
                        <option value="">Select Package</option>
                        <option value="Silver">Silver Package</option>
                        <option value="Gold">Gold Package</option>
                        <option value="Premium">Premium Package</option>
                    </select>
                </div>

                <!-- EVENT DATE -->
                <div class="form-group">
                    <label>Event Date</label>
                    <input type="date" id="eventDate">
                </div>

                <!-- PAYMENT STATUS -->
                <div class="form-group">
                    <label>Payment Status</label>
                    <select id="eventPaymentStatus">
                        <option value="Pending">Pending</option>
                        <option value="Partial Paid">Partial Paid</option>
                        <option value="Fully Paid">Fully Paid</option>
                    </select>
                </div>

                <!-- PAYMENT METHOD (NEW) -->
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="eventPaymentMethod">
                        <option value="Cash">Cash</option>
                        <option value="JazzCash">JazzCash</option>
                        <option value="EasyPaisa">EasyPaisa</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>

                <!-- ORDER STATUS -->
                <div class="form-group">
                    <label>Order Status</label>
                    <select id="eventStatus">
                        <option value="Pending">Pending</option>
                        <option value="Confirmed">Confirmed</option>
                        <option value="Preparing">Preparing</option>
                        <option value="Processing">Processing</option>
                        <option value="Delivered">Delivered</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>

                <!-- DELIVERY ADDRESS -->
                <div class="form-group full-width">
                    <label>Delivery Address</label>
                    <input type="text" id="eventLocation" placeholder="Delivery Address">
                </div>

                <!-- ORDER ID (full-width, readonly) -->
                <div class="form-group full-width">
                    <label>Order ID</label>
                    <input type="text" id="eventOrderId" placeholder="ORD-1001" readonly>
                </div>

                <!-- PAYMENT ID (full-width, readonly) -->
                <div class="form-group full-width">
                    <label>Payment ID</label>
                    <input type="text" id="eventPaymentId" placeholder="PAY-1001" readonly>
                </div>

                <!-- INVOICE / NOTES -->
                <div class="form-group full-width">
                    <label>Invoice / Notes</label>
                    <textarea id="eventInvoice" rows="5" placeholder="Invoice details..."></textarea>
                </div>
            </div>

            <!-- MODAL BUTTONS -->
            <div class="modal-buttons">
                <button class="btn-save" onclick="window.saveEvent()">
                    <i class="fa-solid fa-floppy-disk"></i> Save
                </button>
                <button class="btn-invoice" onclick="window.viewInvoice()">
                    <i class="fa-solid fa-file-invoice"></i> Invoice
                </button>
                <button class="btn-cancel" onclick="window.closeEventModal()">Cancel</button>
            </div>
        </div>
    </div>
</div>
