{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - IK Delights</title>

    <link rel="stylesheet" href="{% static 'css/ik.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Poppins,sans-serif;
            background:#fff7fb;
        }

        .track-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 20px;
        }

        .track-card{
            width:100%;
            max-width:650px;
            background:#fff;
            border-radius:30px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
            position:relative;
            overflow:hidden;
        }

        .track-card::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:6px;
            background:linear-gradient(90deg,#ff7eb3,#ff758c);
        }

        .track-title{
            text-align:center;
            font-size:38px;
            font-weight:700;
            color:#222;
            margin-bottom:10px;
        }

        .track-sub{
            text-align:center;
            color:#777;
            margin-bottom:35px;
        }

        .track-form{
            display:flex;
            gap:15px;
            margin-bottom:30px;
        }

        .track-form input{
            flex:1;
            height:58px;
            border:none;
            outline:none;
            background:#f7f7f7;
            border-radius:16px;
            padding:0 20px;
            font-size:16px;
        }

        .track-btn{
            border:none;
            background:linear-gradient(135deg,#ff7eb3,#ff758c);
            color:#fff;
            padding:0 30px;
            border-radius:16px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        .track-btn:hover{
            transform:translateY(-2px);
        }

        .tracking-result{
            background:#fff7fb;
            border-radius:20px;
            padding:25px;
            display:none;
        }

        .tracking-result.active{
            display:block;
        }

        .order-id{
            font-size:22px;
            font-weight:700;
            color:#222;
            margin-bottom:25px;
            text-align:center;
        }

        .track-steps{
            display:flex;
            justify-content:space-between;
            position:relative;
            margin-top:40px;
        }

        .track-steps::before{
            content:"";
            position:absolute;
            top:25px;
            left:0;
            width:100%;
            height:4px;
            background:#eee;
            z-index:1;
        }

        .step{
            position:relative;
            z-index:2;
            text-align:center;
            width:25%;
        }

        .step-circle{
            width:50px;
            height:50px;
            border-radius:50%;
            background:#ddd;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            font-size:18px;
            margin-bottom:10px;
        }

        .step.active .step-circle{
            background:linear-gradient(135deg,#ff7eb3,#ff758c);
        }

        .step p{
            font-size:14px;
            color:#666;
            margin:0;
            font-weight:500;
        }

        .home-btn{
            margin-top:35px;
            display:flex;
            justify-content:center;
        }

        .home-btn a{
            text-decoration:none;
            background:#222;
            color:#fff;
            padding:14px 28px;
            border-radius:14px;
            font-weight:600;
            transition:.3s;
        }

        .home-btn a:hover{
            background:#000;
        }

        @media(max-width:768px){

            .track-card{
                padding:25px;
            }

            .track-title{
                font-size:28px;
            }

            .track-form{
                flex-direction:column;
            }

            .track-btn{
                height:55px;
            }

            .track-steps{
                flex-direction:column;
                gap:25px;
            }

            .track-steps::before{
                display:none;
            }

            .step{
                width:100%;
            }
        }
    </style>
</head>

<body>

<div class="track-wrapper">

    <div class="track-card">

        <h1 class="track-title">
            <i class="fas fa-box-open"></i>
            Track Your Order
        </h1>

        <p class="track-sub">
            Enter your Order ID to check latest order status
        </p>

        <form class="track-form" onsubmit="trackOrder(event)">

            <input type="text"
                   id="orderInput"
                   placeholder="Enter Order ID (e.g. IK1024)"
                   required>

            <button type="submit" class="track-btn">
                Track
            </button>

        </form>

        <div class="tracking-result" id="trackingResult">

            <div class="order-id">
                Order ID:
                <span id="showOrderId"></span>
            </div>

            <div class="track-steps">

                <div class="step active">
                    <div class="step-circle">
                        <i class="fas fa-check"></i>
                    </div>
                    <p>Order Placed</p>
                </div>

                <div class="step active">
                    <div class="step-circle">
                        <i class="fas fa-birthday-cake"></i>
                    </div>
                    <p>Baking</p>
                </div>

                <div class="step">
                    <div class="step-circle">
                        <i class="fas fa-truck"></i>
                    </div>
                    <p>Out For Delivery</p>
                </div>

                <div class="step">
                    <div class="step-circle">
                        <i class="fas fa-home"></i>
                    </div>
                    <p>Delivered</p>
                </div>

            </div>

        </div>

        <div class="home-btn">
            <a href="/">
                <i class="fas fa-arrow-left"></i>
                Back To Home
            </a>
        </div>

    </div>

</div>

<script>

function trackOrder(e){

    e.preventDefault();

    const orderId =
        document.getElementById("orderInput").value;

    document.getElementById("showOrderId").innerText =
        orderId;

    document.getElementById("trackingResult")
        .classList.add("active");
}

</script>

</body>
</html>
