{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - IK Delights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f8cedb, #fce4ec);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .success-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }
        .success-card i {
            font-size: 4rem;
            color: #28a745;
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 50%;
            margin-bottom: 1rem;
        }
        .success-card h2 {
            color: #c46a84;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .success-card p {
            color: #555;
            margin-bottom: 1.5rem;
        }
        .btn-home {
            background: #c46a84;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background: #a74e68;
        }
    </style>
</head>
<body>
<div class="success-card">
    <i class="fas fa-check-circle"></i>
    <h2>Password Changed!</h2>
    <p>Your password has been successfully updated. You can now use your new password to log in.</p>
    <a href="/" class="btn-home"><i class="fas fa-home"></i> Back to Home</a>
</div>
</body>
</html>
